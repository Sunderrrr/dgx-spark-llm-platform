<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DGX Portal — Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 400px; background: #141414; border: 1px solid #252525; border-radius: 1rem; padding: 2rem; }
    .brand { color: #76b900; font-size: 1.5rem; font-weight: 700; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="brand"><i class="bi bi-gpu-card"></i> DGX Portal</div>
    <p class="text-secondary small mt-1">NVIDIA DGX Spark — Cronos</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label text-secondary small">Identifiant LLDAP</label>
      <input type="text" name="username" class="form-control bg-dark border-secondary" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label text-secondary small">Mot de passe</label>
      <input type="password" name="password" class="form-control bg-dark border-secondary" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Se connecter</button>
  </form>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
