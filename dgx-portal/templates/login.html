<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DGX Portal — Connexion</title>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <style>
    [data-bs-theme="dark"] {
      --bg: #141618; --surface: #1b1e21; --border: #2b3035; --border-strong: #363c42;
      --text: #e7e9ea; --text-muted: #98a1a8; --text-faint: #6a737a;
      --accent: #83c000; --accent-hover: #93d400; --accent-soft: rgba(131,192,0,0.14); --accent-fg: #0c1500;
      --danger: #f2555a; --shadow: 0 12px 40px -20px rgba(0,0,0,.7);
    }
    [data-bs-theme="light"] {
      --bg: #f4f5f6; --surface: #ffffff; --border: #e4e7e9; --border-strong: #d3d8db;
      --text: #191c1f; --text-muted: #5b656c; --text-faint: #8b949b;
      --accent: #5c9000; --accent-hover: #6aa300; --accent-soft: rgba(92,144,0,0.10); --accent-fg: #ffffff;
      --danger: #d63b41; --shadow: 0 12px 40px -22px rgba(16,24,32,.28);
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
    }
    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
      display: grid; place-items: center; cursor: pointer;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border-strong); }
    .login-card {
      width: 100%; max-width: 390px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 2.4rem 2.1rem; box-shadow: var(--shadow);
    }
    .brand-mark {
      width: 52px; height: 52px; margin: 0 auto .9rem; border-radius: 13px; display: grid; place-items: center;
      background: var(--accent); color: var(--accent-fg); font-size: 1.6rem;
    }
    .brand { font-size: 1.35rem; font-weight: 700; text-align: center; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-muted); font-size: .82rem; text-align: center; margin-top: .2rem; }
    .form-label { color: var(--text-muted); font-size: .82rem; font-weight: 500; }
    .form-control {
      background: var(--surface) !important; border-color: var(--border) !important; color: var(--text) !important;
      border-radius: 9px; padding: .6rem .8rem;
    }
    .form-control::placeholder { color: var(--text-faint); }
    .form-control:focus {
      border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-soft) !important;
      background: var(--surface) !important; color: var(--text) !important;
    }
    .btn-login {
      width: 100%; border: none; border-radius: 9px; padding: .65rem; font-weight: 600;
      background: var(--accent); color: var(--accent-fg); transition: background .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .btn-login:hover { background: var(--accent-hover); color: var(--accent-fg); }
    .alert { border-radius: 10px; font-size: .88rem; }
    .alert-danger { background: rgba(214,59,65,0.12); border: 1px solid transparent; color: var(--danger); }
  </style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" type="button" aria-label="Basculer le thème"><i class="bi"></i></button>
<div class="login-card">
  <div class="brand-mark"><i class="bi bi-gpu-card"></i></div>
  <div class="brand">DGX Portal</div>
  <p class="subtitle">NVIDIA DGX Spark · Cronos</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 mt-3 mb-0">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" class="mt-4">
    <div class="mb-3">
      <label class="form-label">Identifiant LLDAP</label>
      <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label">Mot de passe</label>
      <input type="password" name="password" class="form-control" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Se connecter</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
  (function () {
    var root = document.documentElement, btn = document.getElementById('theme-toggle'), icon = btn.querySelector('i');
    function sync() { icon.className = 'bi ' + (root.getAttribute('data-bs-theme') === 'dark' ? 'bi-sun' : 'bi-moon-stars'); }
    sync();
    btn.addEventListener('click', function () {
      var next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-bs-theme', next); localStorage.setItem('theme', next); sync();
    });
  })();
</script>
</body>
</html>
