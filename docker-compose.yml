services:

  # ─── Base de données LiteLLM ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm && psql -U litellm -d litellm -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── LiteLLM — API gateway + gestion des clés ─────────────────────────────
  litellm:
    # Épinglé au digest (repro + anti supply-chain). Tag d'origine : main-latest.
    # Pour mettre à jour : docker pull ghcr.io/berriai/litellm:main-latest puis
    # remplacer le sha ci-dessous par le nouveau digest.
    image: ghcr.io/berriai/litellm@sha256:80ea654c506da9083503d00c1b323b2fecddf17af6add9bf01b2603938e17bd2
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4001:4001"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # SSO Authentik (crée une app OIDC "litellm" dans Authentik, scope: openid profile email)
      GENERIC_CLIENT_ID: ${AUTHENTIK_LITELLM_CLIENT_ID}
      GENERIC_CLIENT_SECRET: ${AUTHENTIK_LITELLM_CLIENT_SECRET}
      GENERIC_AUTHORIZATION_ENDPOINT: https://gjallarhorn.cronos.website/application/o/authorize/
      GENERIC_TOKEN_ENDPOINT: https://gjallarhorn.cronos.website/application/o/token/
      GENERIC_USERINFO_ENDPOINT: https://gjallarhorn.cronos.website/application/o/userinfo/
      GENERIC_REDIRECT_URI: http://dgx.cronos.lan:4001/sso/callback
      GENERIC_CLIENT_SCOPE: "openid profile email"
    entrypoint: ["sh", "-c", "sleep 5 && /app/docker/prod_entrypoint.sh --config /app/config.yaml --port 4001"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── DGX Portal — self-service clés API + catalogue modèles ───────────────
  dgx-portal:
    build: ./dgx-portal
    container_name: dgx-portal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${WEBUI_SECRET_KEY}
      LDAP_URI: ldap://lldap.cronos.lan:3890
      LDAP_BASE: dc=cronos,dc=website
      LDAP_BIND_DN: uid=admin,ou=people,dc=cronos,dc=website
      LDAP_BIND_PW: ${LLDAP_ADMIN_PASSWORD}
      LITELLM_URL: http://litellm:4001
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      VLLM_API_URL: http://host.docker.internal:8000/v1
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      KEY_MAX_BUDGET: "0.002"
      KEY_BUDGET_DURATION: "1d"
      VLLM_RUNNER_URL: http://host.docker.internal:8001
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      # URL publique de l'API compatible OpenAI affichée aux utilisateurs
      PUBLIC_API_URL: https://api.cronos.website/v1
      # Base LiteLLM pour les stats de consommation (ranking + graphe horaire)
      LITELLM_DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres/litellm
      TZ_DISPLAY: Europe/Paris
      # ── SSO / OIDC (Authentik) ──
      OIDC_METADATA_URL: https://gjallarhorn.cronos.website/application/o/dgx-spark/.well-known/openid-configuration
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: https://dgx.cronos.website/api/oauth2-redirect
      OIDC_LOGOUT_URL: https://gjallarhorn.cronos.website/application/o/dgx-spark/end-session/
      OIDC_ADMIN_GROUP: adm_cronos
      # App servie en HTTPS derrière Traefik → cookie de session Secure
      SESSION_COOKIE_SECURE: "1"
    volumes:
      - portal_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm

volumes:
  postgres_data:
  portal_data:

# ─── OpenWebUI ────────────────────────────────────────────────────────────────
# OpenWebUI tourne sur ton autre serveur (vor.cronos.website).
# Change dans sa config :
#   OLLAMA_BASE_URL  →  supprimer
#   Ajouter :
#     OPENAI_API_BASE_URL=http://dgx.cronos.lan:4001/v1
#     OPENAI_API_KEY=<LITELLM_MASTER_KEY>
# Garde tout le reste (Authentik SSO, rôles, etc.) identique.
