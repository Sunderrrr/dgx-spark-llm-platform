<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DGX Portal — Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <style>
    :root {
      --brand: #76b900; --brand-bright: #8fe000; --brand-dim: #5c8f00;
      --bg: #070809; --surface: #101315; --border: #232a2e; --text: #e8edef; --text-muted: #8b979d;
    }
    * { box-sizing: border-box; }
    body {
      background:
        radial-gradient(1000px 600px at 50% -20%, rgba(118,185,0,0.14), transparent 60%),
        radial-gradient(700px 500px at 100% 110%, rgba(118,185,0,0.06), transparent 55%),
        var(--bg);
      display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; padding: 1rem;
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: linear-gradient(180deg, #161a1d, #101315);
      border: 1px solid var(--border); border-radius: 20px; padding: 2.4rem 2.2rem;
      box-shadow: 0 30px 80px -40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.02) inset;
      animation: rise .45s cubic-bezier(.2,.7,.3,1);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(.98); } to { opacity: 1; transform: none; } }
    .brand-icon {
      width: 60px; height: 60px; margin: 0 auto 1rem; border-radius: 16px;
      display: flex; align-items: center; justify-content: center; font-size: 1.9rem; color: #08130a;
      background: linear-gradient(150deg, var(--brand-bright), var(--brand-dim));
      box-shadow: 0 10px 30px -10px rgba(118,185,0,0.6);
    }
    .brand {
      font-size: 1.5rem; font-weight: 800; letter-spacing: .5px; text-align: center;
      background: linear-gradient(92deg, var(--brand-bright), var(--brand));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--text-muted); font-size: .82rem; text-align: center; margin-top: .25rem; }
    .form-label { color: var(--text-muted); font-size: .82rem; font-weight: 500; }
    .form-control {
      background: var(--surface) !important; border-color: var(--border) !important; color: var(--text) !important;
      border-radius: 10px; padding: .6rem .8rem;
    }
    .form-control:focus {
      border-color: var(--brand-dim) !important; box-shadow: 0 0 0 .2rem rgba(118,185,0,0.18) !important;
      background: var(--surface) !important; color: var(--text) !important;
    }
    .btn-login {
      width: 100%; border: none; border-radius: 10px; padding: .65rem; font-weight: 700; color: #08130a;
      background: linear-gradient(92deg, var(--brand-bright), var(--brand)); transition: all .16s ease;
    }
    .btn-login:hover { box-shadow: 0 8px 26px -10px rgba(118,185,0,0.75); transform: translateY(-1px); color: #08130a; }
    .alert { border-radius: 11px; font-size: .88rem; }
    .alert-danger { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand-icon"><i class="bi bi-gpu-card"></i></div>
  <div class="brand">DGX Portal</div>
  <p class="subtitle">NVIDIA DGX Spark · Cronos</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 mt-3 mb-0">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" class="mt-4">
    <div class="mb-3">
      <label class="form-label">Identifiant LLDAP</label>
      <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label">Mot de passe</label>
      <input type="password" name="password" class="form-control" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Se connecter</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
