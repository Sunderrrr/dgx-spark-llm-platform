# Ne jamais redémarrer automatiquement vllm-runner.service après une mise à jour
# de librairies (needrestart) — ça tue le modèle vLLM en cours de chargement/service
# sans prévenir. Un redémarrage de ce service doit toujours être une action délibérée.
$nrconf{override_rc}{'vllm-runner.service'} = 0;
