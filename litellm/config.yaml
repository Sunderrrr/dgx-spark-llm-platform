model_list:
  - model_name: ornith-35b-fp8
    litellm_params:
      model: openai/ornith-35b-fp8
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy
      input_cost_per_token: 0.0000000001
      output_cost_per_token: 0.000000001

  - model_name: qwen3-coder-30b
    litellm_params:
      model: openai/qwen3-coder-30b
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy
      input_cost_per_token: 0.0000000001
      output_cost_per_token: 0.000000001

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true
  default_max_budget: 0.002
  default_budget_duration: "1d"
